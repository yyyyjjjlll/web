<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
  <div id="root"></div>
  <script type="module">
    import React, { useState } from 'https://esm.sh/react@18'
    import ReactDOM from 'https://esm.sh/react-dom@18/client'
    const Demo1 = () =>{
      const [count, setCount] = useState(0)
      const p = React.createElement('p', null, count)
      const btn = React.createElement('button', {onClick:()=>setCount((a)=>a+1)}, '点击+')
      const children = React.createElement('div', null, p, btn) 
      return(
       children
      )
    }
    const root = ReactDOM.createRoot(document.getElementById('root'))
    root.render(React.createElement(Demo1))
  </script>
</body>
</html>
